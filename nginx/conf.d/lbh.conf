# ============================================================
# Configuration Nginx — Plateforme LBH
# Proxy interne unique vers l'interface et l'API
# ============================================================
# Ce fichier est utilisé à l'intérieur du conteneur lbh-nginx.
# Plesk gère le certificat SSL et le proxy externe (80/443).
# Ce proxy interne écoute sur le port 80 du conteneur.
# Le port 127.0.0.1:3082 est exposé vers Plesk.
# ============================================================

resolver 127.0.0.11 ipv6=off valid=30s;

upstream lbh_frontend {
    zone lbh_frontend 64k;
    server lbh-frontend:3000 resolve;
    keepalive 32;
}

upstream lbh_backend {
    zone lbh_backend 64k;
    server lbh-backend:8000 resolve;
    keepalive 32;
}

upstream lbh_services {
    zone lbh_services 64k;
    server lbh-services:8001 resolve;
    keepalive 32;
}

upstream lbh_roundcube {
    zone lbh_roundcube 64k;
    server lbh-roundcube:80 resolve;
    keepalive 16;
}

upstream lbh_collabora {
    zone lbh_collabora 64k;
    server lbh-collabora:9980 resolve;
    keepalive 16;
}

# Taille maximale des imports (doit correspondre à SYS_TAILLE_MAX_IMPORT)
client_max_body_size 100m;

# Délais pour les traitements longs (OCR, analyse, génération)
proxy_read_timeout 300s;
proxy_connect_timeout 60s;
proxy_send_timeout 300s;

server {
    listen 80;
    server_name _;
    proxy_intercept_errors on;
    error_page 502 503 504 /maintenance.html;

    # Nécessaire pour Collabora : évite la normalisation // → / dans les chemins WebSocket
    merge_slashes off;

    # En-têtes de sécurité
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Journalisation
    access_log /var/log/app/nginx/acces.log;
    error_log /var/log/app/nginx/erreurs.log warn;

    location = /maintenance.html {
        root /usr/share/nginx/html;
        internal;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    location = /webmail/ {
        return 301 https://$host/webmail;
    }

    location = /roundcube {
        return 301 https://$host/roundcube/;
    }

    location ^~ /roundcube/ {
        proxy_pass http://lbh_roundcube/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /roundcube;
        proxy_set_header Connection "";
        proxy_buffering off;
    }

    # --------------------------------------------------------
    # Proxy MinIO — médias stockés dans l'objet store
    # Les URLs signées restent valides : la signature couvre le path,
    # pas le hostname (S3 V2/V4). Nginx strip /minio/ et passe à MinIO.
    # --------------------------------------------------------
    location ^~ /minio/ {
        proxy_pass http://lbh-minio:9000/;
        proxy_http_version 1.1;
        proxy_set_header Host lbh-minio:9000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
        # Grands fichiers : plans, PDFs
        client_max_body_size 200m;
        proxy_read_timeout 120s;
    }

    # --------------------------------------------------------
    # API Django — routes /api/
    # --------------------------------------------------------
    location /api/ {
        proxy_pass http://lbh_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
    }

    # --------------------------------------------------------
    # Administration Django — /administration-technique/
    # (accessible uniquement depuis Plesk ou IP de confiance)
    # --------------------------------------------------------
    location /administration-technique/ {
        # Restreindre aux IP de confiance en production
        # allow 127.0.0.1;
        # deny all;
        proxy_pass http://lbh_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --------------------------------------------------------
    # Services spécialisés FastAPI — /services/
    # --------------------------------------------------------
    location /services/ {
        proxy_pass http://lbh_services/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    # --------------------------------------------------------
    # Fichiers statiques Django — /statiques/
    # --------------------------------------------------------
    location /statiques/ {
        alias /var/www/statiques/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # --------------------------------------------------------
    # Médias Django — /medias/
    # --------------------------------------------------------
    location /medias/ {
        alias /var/www/medias/;
        expires 7d;
        add_header Cache-Control "private";
        # Vérification des droits via @acces_media (voir ci-dessous)
        # En production, utiliser X-Accel-Redirect depuis Django
    }

    # --------------------------------------------------------
    # Collabora Online — édition bureautique WOPI
    # --------------------------------------------------------
    location ^~ /collabora/ {
        proxy_pass http://lbh_collabora/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_read_timeout 36000s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 36000s;
    }

    # Ressources statiques Collabora (chemins absolus dans cool.html)
    location ^~ /browser {
        proxy_pass http://lbh_collabora;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    location ^~ /loleaflet/ {
        proxy_pass http://lbh_collabora;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /hosting/ {
        proxy_pass http://lbh_collabora;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /lool/ {
        proxy_pass http://lbh-collabora:9980$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_read_timeout 36000s;
    }

    # WebSocket Collabora — $request_uri préserve l'encodage %xx (%2F, %3A) que Nginx
    # normaliserait autrement. Collabora 25.04 exige un WOPISrc URL-encodé dans le chemin.
    location ^~ /cool/ {
        proxy_pass http://lbh-collabora:9980$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_read_timeout 36000s;
        proxy_send_timeout 36000s;
        proxy_connect_timeout 60s;
        # Désactiver le cache proxy pour les WebSockets actifs
        proxy_cache_bypass $http_upgrade;
        proxy_no_cache $http_upgrade;
    }

    # --------------------------------------------------------
    # Interface Next.js — tout le reste
    # --------------------------------------------------------
    location / {
        proxy_pass http://lbh_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        # Hot reload Next.js (développement uniquement)
    }

    # --------------------------------------------------------
    # Vérification de santé du proxy
    # --------------------------------------------------------
    location /sante-proxy {
        access_log off;
        return 200 "lbh-nginx opérationnel\n";
        add_header Content-Type text/plain;
    }
}
