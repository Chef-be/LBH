<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Maintenance en cours</title>
    <style>
      :root {
        color-scheme: dark;
        --fond: #020617;
        --fond-2: #0f172a;
        --bordure: rgba(255, 255, 255, 0.08);
        --texte: #f8fafc;
        --texte-2: #94a3b8;
        --accent: #f59e0b;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top right, rgba(245, 158, 11, 0.18), transparent 30%),
          linear-gradient(180deg, var(--fond-2), var(--fond));
        color: var(--texte);
        font-family: Inter, system-ui, sans-serif;
      }
      main {
        width: min(100%, 760px);
        border: 1px solid var(--bordure);
        border-radius: 28px;
        background: rgba(15, 23, 42, 0.78);
        backdrop-filter: blur(12px);
        padding: 40px 32px;
        text-align: center;
        box-shadow: 0 20px 80px rgba(0, 0, 0, 0.35);
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 10px 16px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--bordure);
        color: var(--texte-2);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }
      h1 {
        margin: 24px 0 12px;
        font-size: clamp(2rem, 4vw, 3.4rem);
        line-height: 1.05;
      }
      p {
        margin: 0 auto;
        max-width: 48rem;
        color: var(--texte-2);
        font-size: 1.05rem;
        line-height: 1.7;
      }
      .actions {
        margin-top: 32px;
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        justify-content: center;
      }
      a,
      button {
        border: 0;
        border-radius: 14px;
        padding: 14px 20px;
        font: inherit;
        text-decoration: none;
        cursor: pointer;
      }
      .primaire {
        background: var(--accent);
        color: #fff;
        font-weight: 700;
      }
      .secondaire {
        background: transparent;
        color: var(--texte);
        border: 1px solid var(--bordure);
      }
    </style>
  </head>
  <body>
    <main>
      <div class="badge">Intervention technique</div>
      <h1>Maintenance en cours</h1>
      <p>
        La plateforme est temporairement indisponible. Le service sera automatiquement
        rétabli dès que le frontend et le backend seront de nouveau disponibles.
      </p>
      <div class="actions">
        <button class="primaire" type="button" onclick="window.location.reload()">Réessayer</button>
        <a class="secondaire" href="/">Retour à l'accueil</a>
      </div>
    </main>
  </body>
</html>
