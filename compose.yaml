# ============================================================
# compose.yaml — LBH ECONOMISTE
# Généré automatiquement par l'installateur
# Date : 2026-03-28T12:02:46.346996
# Préfixe conteneurs : lbh
# ============================================================
# NE PAS MODIFIER MANUELLEMENT — Regénérer via l'installateur
# ou modifier le gabarit : installateur/gabarits/compose/compose.yaml.j2
# ============================================================

name: lbh

# ------------------------------------------------------------
# VOLUMES PERSISTANTS
# ------------------------------------------------------------
volumes:
  lbh-donnees-postgresql:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /var/www/vhosts/lbh-economiste.com/httpdocs/volumes/lbh/postgresql

  lbh-donnees-redis:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /var/www/vhosts/lbh-economiste.com/httpdocs/volumes/lbh/redis

  lbh-donnees-minio:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /var/www/vhosts/lbh-economiste.com/httpdocs/volumes/lbh/minio

  lbh-journaux:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /var/www/vhosts/lbh-economiste.com/httpdocs/volumes/lbh/journaux

  lbh-medias:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /var/www/vhosts/lbh-economiste.com/httpdocs/volumes/lbh/medias

  lbh-statiques:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /var/www/vhosts/lbh-economiste.com/httpdocs/volumes/lbh/statiques

  lbh-donnees-roundcube:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /var/www/vhosts/lbh-economiste.com/httpdocs/volumes/lbh/roundcube/db

  lbh-temp-roundcube:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /var/www/vhosts/lbh-economiste.com/httpdocs/volumes/lbh/roundcube/temp

# ------------------------------------------------------------
# RÉSEAU DÉDIÉ
# ------------------------------------------------------------
networks:
  lbh-reseau:
    driver: bridge
    name: lbh-reseau

# ============================================================
# SERVICES
# ============================================================
services:

  # ----------------------------------------------------------
  # PROXY — Point d'entrée Plesk (port 3082)
  # ----------------------------------------------------------
  lbh-nginx:
    image: nginx:1.27-alpine
    container_name: lbh-nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:${PORT_ENTREE_PLESK}:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/html:/usr/share/nginx/html:ro
      - lbh-statiques:/var/www/statiques:ro
      - lbh-medias:/var/www/medias:ro
      - lbh-journaux:/var/log/app/nginx:rw
    depends_on:
      lbh-frontend:
        condition: service_healthy
      lbh-backend:
        condition: service_healthy
      lbh-roundcube:
        condition: service_started
    networks:
      - lbh-reseau
    environment:
      - TZ=${FUSEAU_HORAIRE}
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ----------------------------------------------------------
  # INTERFACE — Next.js
  # ----------------------------------------------------------
  lbh-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: ${ENVIRONNEMENT}
    container_name: lbh-frontend
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=${ENVIRONNEMENT}
      - TZ=${FUSEAU_HORAIRE}
      - PREFIXE_CONTENEURS=${PREFIXE_CONTENEURS}
      - NEXTAUTH_SECRET=${SECRET_NEXTAUTH}
      - NEXTAUTH_URL=${URL_BASE}
      - NEXT_PUBLIC_API_URL=/api
      - NEXT_PUBLIC_NOM_PLATEFORME=${NOM_PLATEFORME}
      - NEXT_PUBLIC_PREFIXE=${PREFIXE_CONTENEURS}
      - URL_BACKEND=${URL_BACKEND}
      - HOSTNAME=0.0.0.0
    depends_on:
      lbh-backend:
        condition: service_healthy
    networks:
      - lbh-reseau
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/sante"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ----------------------------------------------------------
  # WEBMAIL — Roundcube
  # ----------------------------------------------------------
  lbh-roundcube:
    image: roundcube/roundcubemail:latest
    container_name: lbh-roundcube
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - ./roundcube/config:/var/roundcube/config:ro
      - ./roundcube/skins/elastic/templates/about.html:/var/www/html/skins/elastic/templates/about.html:ro
      - lbh-donnees-roundcube:/var/roundcube/db:rw
      - lbh-temp-roundcube:/tmp/roundcube-temp:rw
    environment:
      - ROUNDCUBEMAIL_DEFAULT_HOST=ssl://${COURRIEL_HOTE_IMAP:-mail.lbh-economiste.com}
      - ROUNDCUBEMAIL_DEFAULT_PORT=${COURRIEL_PORT_IMAP:-993}
      - ROUNDCUBEMAIL_SMTP_SERVER=ssl://${COURRIEL_HOTE_SMTP}
      - ROUNDCUBEMAIL_SMTP_PORT=${COURRIEL_PORT_SMTP}
      - ROUNDCUBEMAIL_DB_TYPE=sqlite
      - ROUNDCUBEMAIL_REQUEST_PATH=/roundcube/
      - ROUNDCUBEMAIL_PLUGINS=zipdownload
      - ROUNDCUBEMAIL_SKIN=elastic
      - ROUNDCUBEMAIL_UPLOAD_MAX_FILESIZE=25M
      - ROUNDCUBEMAIL_USERNAME_DOMAIN=
      - TZ=${FUSEAU_HORAIRE}
      - ROUNDCUBE_DES_KEY=${SECRET_DJANGO}
      - ROUNDCUBE_SENT_MBOX=${COURRIEL_DOSSIER_ENVOYES:-INBOX.Sent}
      - ROUNDCUBE_DRAFTS_MBOX=${COURRIEL_DOSSIER_BROUILLONS:-INBOX.Drafts}
      - ROUNDCUBE_JUNK_MBOX=${COURRIEL_DOSSIER_INDESIRABLES:-INBOX.Spam}
      - ROUNDCUBE_TRASH_MBOX=${COURRIEL_DOSSIER_CORBEILLE:-INBOX.Trash}
    networks:
      - lbh-reseau
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ----------------------------------------------------------
  # COLLABORA ONLINE — Serveur d'édition bureautique WOPI
  # ----------------------------------------------------------
  lbh-collabora:
    image: collabora/code:latest
    container_name: lbh-collabora
    restart: unless-stopped
    expose:
      - "9980"
    cap_add:
      - MKNOD
    environment:
      - username=${COLLABORA_ADMIN_UTILISATEUR:-admin}
      - password=${COLLABORA_ADMIN_MOT_DE_PASSE}
      - DONT_GEN_SSL_CERT=YES
      - extra_params=--o:ssl.enable=false --o:ssl.termination=true --o:logging.level=warning --o:net.post_allow.host[0]=lbh-nginx --o:net.post_allow.host[1]=lbh-backend --o:net.post_allow.host[2]=lbh-economiste.com --o:net.frame_ancestors=https://lbh-economiste.com https://www.lbh-economiste.com
      - TZ=${FUSEAU_HORAIRE}
    volumes:
      - ./collabora/coolwsd.xml:/etc/coolwsd/coolwsd.xml:ro
    networks:
      - lbh-reseau
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9980/hosting/discovery"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 120s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ----------------------------------------------------------
  # CŒUR APPLICATIF — Django
  # ----------------------------------------------------------
  lbh-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lbh-backend
    restart: unless-stopped
    expose:
      - "8000"
    volumes:
      - ./backend:/app:rw
      - ./calculs:/app/calculs:ro
      - lbh-medias:/app/medias:rw
      - lbh-statiques:/app/statiques:rw
      - lbh-journaux:/var/log/app/backend:rw
      - ${CHEMIN_RESSOURCES_DOCUMENTAIRES}:/ressources:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc:/host_proc:ro
      - /:/hostfs:ro
    environment:
      - DJANGO_SETTINGS_MODULE=configuration.parametres.${ENVIRONNEMENT}
      - SECRET_DJANGO=${SECRET_DJANGO}
      - NOM_PLATEFORME=${NOM_PLATEFORME}
      - PREFIXE_CONTENEURS=${PREFIXE_CONTENEURS}
      - BDD_HOTE=${BDD_HOTE}
      - BDD_PORT=${BDD_PORT}
      - BDD_NOM=${BDD_NOM}
      - BDD_UTILISATEUR=${BDD_UTILISATEUR}
      - BDD_MOT_DE_PASSE=${BDD_MOT_DE_PASSE}
      - REDIS_HOTE=${REDIS_HOTE}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_MOT_DE_PASSE=${REDIS_MOT_DE_PASSE}
      - URL_REDIS=${URL_REDIS}
      - CELERY_COURTIER=${CELERY_COURTIER}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_ACCES_CLE=${MINIO_ACCES_CLE}
      - MINIO_SECRET_CLE=${MINIO_SECRET_CLE}
      - MINIO_SSL=${MINIO_SSL}
      - COURRIEL_HOTE_SMTP=${COURRIEL_HOTE_SMTP}
      - COURRIEL_PORT_SMTP=${COURRIEL_PORT_SMTP}
      - COURRIEL_TLS=${COURRIEL_TLS}
      - COURRIEL_SSL=${COURRIEL_SSL}
      - COURRIEL_UTILISATEUR=${COURRIEL_UTILISATEUR}
      - COURRIEL_MOT_DE_PASSE=${COURRIEL_MOT_DE_PASSE}
      - TZ=${FUSEAU_HORAIRE}
      - DEBUG=${DEBUG}
      - URL_BASE=${URL_BASE}
      - DOMAINES_AUTORISES=${DOMAINES_AUTORISES}
      - SUPERVISION_HOST_PROC_PATH=/host_proc
      - SUPERVISION_HOST_FS_PATH=/hostfs
      - COLLABORA_URL=${COLLABORA_URL}
      - COLLABORA_PUBLIC_URL=${COLLABORA_PUBLIC_URL}
      - WOPI_SECRET=${WOPI_SECRET}
    depends_on:
      lbh-postgresql:
        condition: service_healthy
      lbh-redis:
        condition: service_healthy
    networks:
      - lbh-reseau
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/sante/"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 90s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ----------------------------------------------------------
  # SERVICES FASTAPI
  # ----------------------------------------------------------
  lbh-services:
    build:
      context: ./services
      dockerfile: Dockerfile
    container_name: lbh-services
    restart: unless-stopped
    expose:
      - "8001"
    volumes:
      - ./services:/app:rw
      - lbh-medias:/app/medias:rw
      - lbh-journaux:/var/log/app/services:rw
    environment:
      - TZ=${FUSEAU_HORAIRE}
      - BDD_URL=${DATABASE_URL}
      - REDIS_URL=${URL_REDIS}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_ACCES_CLE=${MINIO_ACCES_CLE}
      - MINIO_SECRET_CLE=${MINIO_SECRET_CLE}
      - SECRET_API=${SECRET_DJANGO}
    depends_on:
      lbh-postgresql:
        condition: service_healthy
      lbh-redis:
        condition: service_healthy
    networks:
      - lbh-reseau
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/sante"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ----------------------------------------------------------
  # BASE DE DONNÉES — PostgreSQL + PostGIS
  # ----------------------------------------------------------
  lbh-postgresql:
    image: postgis/postgis:16-3.4
    container_name: lbh-postgresql
    restart: unless-stopped
    expose:
      - "5432"
    ports:
      - "127.0.0.1:${PORT_POSTGRESQL_LOCAL}:5432"
    volumes:
      - lbh-donnees-postgresql:/var/lib/postgresql/data:rw
      - ./scripts/installation/init-postgresql.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    environment:
      - POSTGRES_DB=${BDD_NOM}
      - POSTGRES_USER=${BDD_UTILISATEUR}
      - POSTGRES_PASSWORD=${BDD_MOT_DE_PASSE}
      - PGDATA=/var/lib/postgresql/data/pgdata
      - TZ=${FUSEAU_HORAIRE}
    networks:
      - lbh-reseau
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${BDD_UTILISATEUR} -d ${BDD_NOM}"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ----------------------------------------------------------
  # CACHE ET FILE D'ATTENTE — Redis
  # ----------------------------------------------------------
  lbh-redis:
    image: redis:7-alpine
    container_name: lbh-redis
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - lbh-donnees-redis:/data:rw
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
    environment:
      - TZ=${FUSEAU_HORAIRE}
    networks:
      - lbh-reseau
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # ----------------------------------------------------------
  # STOCKAGE OBJET — MinIO
  # ----------------------------------------------------------
  lbh-minio:
    image: minio/minio:latest
    container_name: lbh-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:${PORT_MINIO_API}:9000"
      - "127.0.0.1:${PORT_MINIO_CONSOLE}:9001"
    volumes:
      - lbh-donnees-minio:/data:rw
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCES_CLE}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_CLE}
      - TZ=${FUSEAU_HORAIRE}
    networks:
      - lbh-reseau
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # ----------------------------------------------------------
  # TRAITEMENT ASYNCHRONE — Celery Worker
  # ----------------------------------------------------------
  lbh-celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lbh-celery
    restart: unless-stopped
    command: celery -A configuration worker --loglevel=info --concurrency=4 -Q principale,documents,calculs,courriels
    volumes:
      - ./backend:/app:rw
      - lbh-medias:/app/medias:rw
      - lbh-journaux:/var/log/app/celery:rw
      - ${CHEMIN_RESSOURCES_DOCUMENTAIRES}:/ressources:ro
    environment:
      - DJANGO_SETTINGS_MODULE=configuration.parametres.${ENVIRONNEMENT}
      - SECRET_DJANGO=${SECRET_DJANGO}
      - CELERY_COURTIER=${CELERY_COURTIER}
      - CELERY_RESULTATS=${CELERY_RESULTATS}
      - URL_REDIS=${URL_REDIS}
      - REDIS_HOTE=${REDIS_HOTE}
      - REDIS_PORT=${REDIS_PORT}
      - BDD_HOTE=${BDD_HOTE}
      - BDD_PORT=${BDD_PORT}
      - BDD_NOM=${BDD_NOM}
      - BDD_UTILISATEUR=${BDD_UTILISATEUR}
      - BDD_MOT_DE_PASSE=${BDD_MOT_DE_PASSE}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_ACCES_CLE=${MINIO_ACCES_CLE}
      - MINIO_SECRET_CLE=${MINIO_SECRET_CLE}
      - TZ=${FUSEAU_HORAIRE}
    depends_on:
      lbh-redis:
        condition: service_healthy
      lbh-postgresql:
        condition: service_healthy
    networks:
      - lbh-reseau
    healthcheck:
      test: ["CMD", "celery", "-A", "configuration", "inspect", "ping", "--timeout=10"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ----------------------------------------------------------
  # ORDONNANCEUR — Celery Beat
  # ----------------------------------------------------------
  lbh-celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lbh-celery-beat
    restart: unless-stopped
    command: celery -A configuration beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./backend:/app:rw
      - lbh-journaux:/var/log/app/celery-beat:rw
    environment:
      - DJANGO_SETTINGS_MODULE=configuration.parametres.${ENVIRONNEMENT}
      - SECRET_DJANGO=${SECRET_DJANGO}
      - CELERY_COURTIER=${CELERY_COURTIER}
      - URL_REDIS=${URL_REDIS}
      - REDIS_HOTE=${REDIS_HOTE}
      - REDIS_PORT=${REDIS_PORT}
      - BDD_HOTE=${BDD_HOTE}
      - BDD_PORT=${BDD_PORT}
      - BDD_NOM=${BDD_NOM}
      - BDD_UTILISATEUR=${BDD_UTILISATEUR}
      - BDD_MOT_DE_PASSE=${BDD_MOT_DE_PASSE}
      - TZ=${FUSEAU_HORAIRE}
    depends_on:
      lbh-redis:
        condition: service_healthy
      lbh-postgresql:
        condition: service_healthy
    networks:
      - lbh-reseau
    healthcheck:
      test: ["CMD", "python", "-c", "import celery; print('ok')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # ----------------------------------------------------------
  # OCR — Tesseract 5 + Python
  # ----------------------------------------------------------
  lbh-ocr:
    build:
      context: ./services/ocr
      dockerfile: Dockerfile
    container_name: lbh-ocr
    restart: unless-stopped
    expose:
      - "8010"
    volumes:
      - ./services/ocr:/app:rw
      - lbh-journaux:/var/log/app/ocr:rw
    environment:
      - TZ=${FUSEAU_HORAIRE}
      - OCR_LANGUES=${OCR_LANGUES}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_ACCES_CLE=${MINIO_ACCES_CLE}
      - MINIO_SECRET_CLE=${MINIO_SECRET_CLE}
    depends_on:
      lbh-minio:
        condition: service_healthy
    networks:
      - lbh-reseau
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/sante"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # ----------------------------------------------------------
  # ANALYSE PDF
  # ----------------------------------------------------------
  lbh-analyse-pdf:
    build:
      context: ./services/analyse-pdf
      dockerfile: Dockerfile
    container_name: lbh-analyse-pdf
    restart: unless-stopped
    expose:
      - "8011"
    volumes:
      - ./services/analyse-pdf:/app:rw
      - lbh-journaux:/var/log/app/analyse-pdf:rw
    environment:
      - TZ=${FUSEAU_HORAIRE}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_ACCES_CLE=${MINIO_ACCES_CLE}
      - MINIO_SECRET_CLE=${MINIO_SECRET_CLE}
    depends_on:
      lbh-minio:
        condition: service_healthy
    networks:
      - lbh-reseau
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8011/sante"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # ----------------------------------------------------------
  # ANALYSE CAO — DXF/DWG
  # ----------------------------------------------------------
  lbh-analyse-cao:
    build:
      context: ./services/analyse-cao
      dockerfile: Dockerfile
    container_name: lbh-analyse-cao
    restart: unless-stopped
    expose:
      - "8012"
    volumes:
      - ./services/analyse-cao:/app:rw
      - lbh-journaux:/var/log/app/analyse-cao:rw
    environment:
      - TZ=${FUSEAU_HORAIRE}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_ACCES_CLE=${MINIO_ACCES_CLE}
      - MINIO_SECRET_CLE=${MINIO_SECRET_CLE}
    depends_on:
      lbh-minio:
        condition: service_healthy
    networks:
      - lbh-reseau
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8012/sante"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
